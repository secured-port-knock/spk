name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # Unit tests -- run on all three platforms
  # ---------------------------------------------------------------
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run unit tests
        run: go test ./... -count=1 -timeout 120s

  # ---------------------------------------------------------------
  # Unit tests with coverage (Linux only, uploaded as artifact)
  # ---------------------------------------------------------------
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests with coverage
        run: go test ./... -coverprofile=coverage.out -count=1 -timeout 120s

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  # ---------------------------------------------------------------
  # Integration tests
  # ---------------------------------------------------------------
  integration-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run integration tests
        run: go test -v -count=1 -timeout 120s ./tests/integration/

  # ---------------------------------------------------------------
  # Sniffer tests -- Linux (pcap + AF_PACKET)
  # ---------------------------------------------------------------
  sniffer-tests-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install libpcap
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Build sniffer test binary (verify pcap compiles)
        run: go test -c -o /tmp/spk_sniffer_test ./internal/sniffer/

      - name: Run all sniffer tests (pcap + AF_PACKET + parse + dynamic ports)
        run: sudo go test -v -count=1 -timeout 180s ./internal/sniffer/

  # ---------------------------------------------------------------
  # Sniffer tests -- Windows
  # Npcap cannot be silently installed in CI without the paid OEM
  # installer, so pcap tests auto-skip (loadPcapLibrary returns an
  # error when wpcap.dll is absent).  All non-pcap tests still run:
  # parse logic, UDP sniffer, WinDivert stubs, detection, dynamic
  # ports, struct sizes, and pcap_dynamic creation/stop tests.
  # ---------------------------------------------------------------
  sniffer-tests-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run sniffer tests (pcap auto-skipped without Npcap)
        run: go test -v -count=1 -timeout 120s ./internal/sniffer/

  # ---------------------------------------------------------------
  # Sniffer tests -- macOS (pcap via built-in libpcap)
  # ---------------------------------------------------------------
  sniffer-tests-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run all sniffer tests (pcap + parse + dynamic ports)
        run: sudo go test -v -count=1 -timeout 180s ./internal/sniffer/

  # ---------------------------------------------------------------
  # Build script verification -- Linux (ubuntu-latest)
  # Tests: all-platforms amd64+arm64, linux/windows pcap via zig,
  #        darwin pcap skipped (no native macOS toolchain),
  #        nopcap, deb+rpm packaging, build script -test flag.
  # ---------------------------------------------------------------
  build-scripts-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.13.0"

      - name: Install tools (libpcap, nfpm)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpcap-dev
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build all platforms amd64+arm64 (pcap via zig)
        run: chmod +x build.sh && ./build.sh -all

      - name: Build all platforms without pcap
        run: ./build.sh -all -nopcap

      - name: Build linux + create deb and rpm packages
        run: ./build.sh -linux -deb -rpm

      - name: Run tests via build script (-test flag)
        run: ./build.sh -test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: build/

  # ---------------------------------------------------------------
  # Build script verification -- macOS (macos-latest, arm64)
  # Tests: all-platforms amd64+arm64, linux/windows pcap via zig,
  #        darwin/arm64 pcap via native clang (IS_NATIVE),
  #        darwin/amd64 no-pcap (cross-arch; zig never used for darwin),
  #        nopcap, deb+rpm packaging, build script -test flag.
  # ---------------------------------------------------------------
  build-scripts-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.13.0"

      - name: Install tools (nfpm)
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build all platforms amd64+arm64 (linux/windows pcap via zig; darwin via native clang)
        run: chmod +x build.sh && ./build.sh -all

      - name: Build all platforms without pcap
        run: ./build.sh -all -nopcap

      - name: Build linux + create deb and rpm packages
        run: ./build.sh -linux -deb -rpm

      - name: Run tests via build script (-test flag)
        run: ./build.sh -test

  # ---------------------------------------------------------------
  # Build script verification -- Windows (windows-latest)
  # Tests: all-platforms amd64+arm64, windows pcap (pure Go),
  #        linux pcap via zig, darwin pcap skipped (no native
  #        macOS toolchain), nopcap, deb+rpm packaging (cross-
  #        compiled linux binary), build script -test flag.
  # ---------------------------------------------------------------
  build-scripts-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.13.0"

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build all platforms amd64+arm64
        run: .\build.ps1 -all

      - name: Build all platforms without pcap
        run: .\build.ps1 -all -nopcap

      - name: Build linux + create deb and rpm packages
        run: .\build.ps1 -linux -deb -rpm

      - name: Run tests via build script (-test flag)
        run: .\build.ps1 -test

  # ---------------------------------------------------------------
  # Build script verification -- no zig, Linux (ubuntu-latest)
  # Verifies behavior when zig is absent:
  #   windows/*      -> pcap (pure Go, always)
  #   linux/amd64    -> pcap (native gcc, host is amd64)
  #   linux/arm64    -> no-pcap (cross, no zig)
  #   darwin/*       -> no-pcap (cross from linux, no native clang)
  # ---------------------------------------------------------------
  build-scripts-linux-nozig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build all platforms (no zig installed)
        run: chmod +x build.sh && ./build.sh -all

      - name: Verify expected pcap/no-pcap outputs
        run: |
          fail=0
          expect_pcap()   { find "build/$1" -name "*p-$1-$2*" -type f 2>/dev/null | grep -q . || { echo "FAIL: expected pcap binary for $1/$2"; fail=1; }; }
          expect_nopcap() { find "build/$1" -name "*p-$1-$2*" -type f 2>/dev/null | grep -q . && { echo "FAIL: unexpected pcap binary for $1/$2 (should be no-pcap)"; fail=1; } || true; }
          expect_pcap   windows amd64
          expect_pcap   windows arm64
          expect_pcap   linux   amd64
          expect_nopcap linux   arm64
          expect_nopcap darwin  amd64
          expect_nopcap darwin  arm64
          exit $fail

  # ---------------------------------------------------------------
  # Build script verification -- no zig, macOS (macos-latest, arm64)
  # Verifies behavior when zig is absent:
  #   windows/*      -> pcap (pure Go, always)
  #   linux/*        -> no-pcap (cross from macOS, no zig)
  #   darwin/arm64   -> pcap (native clang, host is arm64)
  #   darwin/amd64   -> no-pcap (cross-arch on arm64 host)
  # ---------------------------------------------------------------
  build-scripts-macos-nozig:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build all platforms (no zig installed)
        run: chmod +x build.sh && ./build.sh -all

      - name: Verify expected pcap/no-pcap outputs
        run: |
          fail=0
          expect_pcap()   { find "build/$1" -name "*p-$1-$2*" -type f 2>/dev/null | grep -q . || { echo "FAIL: expected pcap binary for $1/$2"; fail=1; }; }
          expect_nopcap() { find "build/$1" -name "*p-$1-$2*" -type f 2>/dev/null | grep -q . && { echo "FAIL: unexpected pcap binary for $1/$2 (should be no-pcap)"; fail=1; } || true; }
          expect_pcap   windows amd64
          expect_pcap   windows arm64
          expect_nopcap linux   amd64
          expect_nopcap linux   arm64
          expect_nopcap darwin  amd64
          expect_pcap   darwin  arm64
          exit $fail

  # ---------------------------------------------------------------
  # Build script verification -- no zig, Windows (windows-latest)
  # Verifies behavior when zig is absent:
  #   windows/*      -> pcap (pure Go, always)
  #   linux/*        -> no-pcap (cross from Windows, no zig/gcc)
  #   darwin/*       -> no-pcap (cross from Windows, no native clang)
  # ---------------------------------------------------------------
  build-scripts-windows-nozig:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build all platforms (no zig installed)
        run: .\build.ps1 -all

      - name: Verify expected pcap/no-pcap outputs
        run: |
          $fail = $false
          function Expect-Pcap($os, $arch) {
            $found = Get-ChildItem "build\$os" -Filter "*p-${os}-${arch}*" -ErrorAction SilentlyContinue
            if (-not $found) { Write-Host "FAIL: expected pcap binary for $os/$arch" -ForegroundColor Red; $script:fail = $true }
          }
          function Expect-NoPcap($os, $arch) {
            $found = Get-ChildItem "build\$os" -Filter "*p-${os}-${arch}*" -ErrorAction SilentlyContinue
            if ($found) { Write-Host "FAIL: unexpected pcap binary for $os/$arch (should be no-pcap)" -ForegroundColor Red; $script:fail = $true }
          }
          Expect-Pcap   windows amd64
          Expect-Pcap   windows arm64
          Expect-NoPcap linux   amd64
          Expect-NoPcap linux   arm64
          Expect-NoPcap darwin  amd64
          Expect-NoPcap darwin  arm64
          if ($fail) { exit 1 }

  # ---------------------------------------------------------------
  # Lint / vet
  # ---------------------------------------------------------------
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: go vet
        run: go vet ./...

  # ---------------------------------------------------------------
  # Vulnerability check (informational -- does not block CI)
  # ---------------------------------------------------------------
  govulncheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
